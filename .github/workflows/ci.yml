name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── LINT & TYPE CHECK ─────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  # ── UNIT TESTS ────────────────────────────────────────────────
  # Covers all src/**/*.test.ts — including Sprint 1 new modules:
  #   src/utils/ruler-units.test.ts      (M9 ruler unit conversions)
  #   src/ui/resize/panel-resizer.test.ts (M3 resizable panels)
  #   src/ui/tabs/tab-bar.test.ts         (M1 multi-file tabs)
  #   src/ui/viewport/viewport-layout.test.ts (M2 split viewport)
  unit-tests:
    name: Unit Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:unit -- --coverage
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.os == 'ubuntu-latest'
        with:
          flags: unit-${{ matrix.os }}

  # ── INTEGRATION TESTS ─────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:integration

  # ── BUILD CHECK ───────────────────────────────────────────────
  build:
    name: Build Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Check bundle size (main entry ≤ 500KB)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          MAIN_JS=$(ls dist/assets/index-*.js 2>/dev/null | head -1)
          if [ -z "$MAIN_JS" ]; then
            echo "WARNING: No index-*.js found in dist/assets/"
            exit 0
          fi
          SIZE=$(stat -c%s "$MAIN_JS" 2>/dev/null || stat -f%z "$MAIN_JS")
          echo "Main entry bundle: ${SIZE} bytes"
          if [ "${SIZE}" -gt 512000 ]; then
            echo "ERROR: Main bundle exceeds 500KB limit (${SIZE} bytes)"
            exit 1
          fi
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: runner.os == 'Linux'
        with:
          name: dist
          path: dist/
          retention-days: 3

  # ── VISUAL REGRESSION ─────────────────────────────────────────
  visual-tests:
    name: Visual Regression Tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - run: npm run test:visual -- --project=chromium
      - name: Upload visual diff artifacts on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: visual-regression-diffs
          path: tests/visual/diffs/
          retention-days: 7

  # ── E2E TESTS ─────────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests (${{ matrix.browser }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps ${{ matrix.browser }}
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - run: npm run test:e2e -- --project=${{ matrix.browser }}
      - name: Upload E2E artifacts on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-${{ matrix.browser }}-artifacts
          path: tests/playwright-report/
          retention-days: 7

  # ── PERFORMANCE BENCHMARKS ────────────────────────────────────
  performance:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:bench || true
