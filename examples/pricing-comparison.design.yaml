  # ══════════════════════════════════════════════════════════════
  #  Vega-Lite bar chart — feature comparison by tier
  #  Positioned to the left, using available negative space
  # ══════════════════════════════════════════════════════════════

  - id: chart-comparison
    type: chart
    z: 40
    x: 56
    y: 120
    width: 300
    height: 340
    spec:
      $schema: "https://vega.github.io/schema/vega-lite/v5.json"
      title:
        text: "Feature Value by Tier"
        color: "#7878AA"
        fontSize: 11
        font: "Inter"
      data:
        values:
          - { feature: "Storage", tier: "Free", score: 1 }
          - { feature: "Storage", tier: "Pro", score: 5 }
          - { feature: "Storage", tier: "Enterprise", score: 10 }
          - { feature: "Integrations", tier: "Free", score: 2 }
          - { feature: "Integrations", tier: "Pro", score: 6 }
          - { feature: "Integrations", tier: "Enterprise", score: 10 }
          - { feature: "Support", tier: "Free", score: 1 }
          - { feature: "Support", tier: "Pro", score: 6 }
          - { feature: "Support", tier: "Enterprise", score: 10 }
          - { feature: "Team Size", tier: "Free", score: 1 }
          - { feature: "Team Size", tier: "Pro", score: 5 }
          - { feature: "Team Size", tier: "Enterprise", score: 10 }
      mark: { type: bar, cornerRadiusTopLeft: 3, cornerRadiusTopRight: 3 }
      encoding:
        x:
          field: tier
          type: nominal
          axis:
            labelColor: "#7878AA"
            tickColor: "#2A2A4A"
            domainColor: "#2A2A4A"
            labelFontSize: 10
          title: null
        y:
