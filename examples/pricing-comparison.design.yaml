_protocol: design/v1
_mode: complete

# ─────────────────────────────────────────────────────────────────
#  PRICING COMPARISON — SaaS Pricing Table (3 tiers)
#  Format: 1200×700px landscape
#  Type: poster
#  Style: Clean dark UI, card-based layout, vega-lite bar chart
# ─────────────────────────────────────────────────────────────────

meta:
  id: pricing-comparison-001
  name: SaaS Pricing Comparison — Choose Your Plan
  type: poster
  created: "2026-04-24"
  modified: "2026-04-24"
  generator: folio-mcp
  tags: [pricing, saas, comparison, dark-ui, cards]

document:
  width: 1200
  height: 700
  unit: px
  dpi: 72

theme:
  ref: dark-tech
  overrides:
    primary: "#6366F1"
    secondary: "#8B5CF6"
    accent: "#F59E0B"
    background: "#0C0C14"
    surface: "#14142A"
    surface2: "#1E1E38"
    surface3: "#28284A"
    text: "#F1F1FB"
    text_muted: "#7878AA"
    heading: "Inter"
    body: "Inter"
    mono: "JetBrains Mono"

layers:

  # ══════════════════════════════════════════════════════════════
  #  GROUP: grp-bg
  #  Background + subtle grid/noise texture
  # ══════════════════════════════════════════════════════════════

  - id: grp-bg
    type: group
    z: 0
    x: 0
    y: 0
    layers:

      - id: bg-base
        type: rect
        z: 0
        x: 0
        y: 0
        width: 1200
        height: 700
        fill:
          type: linear
          angle: 135
          stops:
            - { color: "#0C0C14", position: 0 }
            - { color: "#10101E", position: 100 }

      - id: bg-glow-center
        type: rect
        z: 1
        x: 200
        y: -100
        width: 800
        height: 600
        fill:
          type: radial
          cx: 50
          cy: 30
          radius: 55
          stops:
            - { color: "#6366F1", position: 0 }
            - { color: "transparent", position: 100 }
        opacity: 0.1

      - id: bg-noise
        type: rect
        z: 2
        x: 0
        y: 0
        width: 1200
        height: 700
        fill:
          type: noise
          opacity: 0.025
          frequency: 0.8
          octaves: 3

  # ══════════════════════════════════════════════════════════════
  #  GROUP: grp-header
  #  Title + subtitle
  # ══════════════════════════════════════════════════════════════

  - id: grp-header
    type: group
    z: 10
    x: 0
    y: 0
    layers:

      - id: header-title
        type: text
        z: 10
        x: 40
        y: 32
        width: 1120
        height: auto
        content: { type: plain, value: "Choose Your Plan" }
        style:
          font_family: "$heading"
          font_size: 36
          font_weight: 800
          color: "$text"
          text_align: center
          letter_spacing: -0.5

      - id: header-subtitle
        type: text
        z: 10
        x: 40
        y: 78
        width: 1120
        height: auto
        content: { type: plain, value: "Start free, scale as you grow. Upgrade or cancel at any time." }
        style:
          font_family: "$body"
          font_size: 15
          font_weight: 400
          color: "$text_muted"
          text_align: center

      # Popular badge for Pro card
      - id: header-popular-bg
        type: rect
        z: 11
        x: 530
        y: 26
        width: 140
        height: 24
        fill:
          type: linear
          angle: 135
          stops:
