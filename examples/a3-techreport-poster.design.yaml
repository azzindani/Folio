_protocol: design/v1
_mode: complete

# ─────────────────────────────────────────────────────────────────
#  A3 TECH REPORT POSTER — "State of AI Infrastructure 2026"
#  Format: A3 landscape (4961 × 3508 px @ 300 DPI, screen: 1587 × 1122 px)
#  Complexity: 80+ layers | multi-column | data sections | decorative
#  Purpose: demonstrate full schema depth on a single poster
# ─────────────────────────────────────────────────────────────────

meta:
  id: a3-techreport-001
  name: State of AI Infrastructure 2026 — A3 Poster
  type: poster
  created: "2026-04-13"
  modified: "2026-04-13"
  generator: folio-mcp
  tags: [tech, report, infographic, a3, landscape]

document:
  width: 1587
  height: 1122
  unit: px
  dpi: 150
  print:
    bleed: 9
    crop_marks: true
    color_mode: cmyk_simulation

theme:
  ref: dark-tech
  overrides:
    primary: "#00D4FF"
    secondary: "#7B2FFF"
    accent: "#FF6B35"
    accent2: "#2ECC71"
    background: "#06080F"
    surface: "#0E1421"
    surface2: "#151E30"
    surface3: "#1C2640"
    text: "#E8EDF5"
    text_muted: "#7A8BA8"
    text_dim: "#3D4E66"
    heading: "Inter"
    body: "Inter"
    mono: "JetBrains Mono"
    border: "#1F2E47"
    border_accent: "#00D4FF"

# ═══════════════════════════════════════════════════════════════
#  BACKGROUND LAYER STACK  (z: 0–9)
# ═══════════════════════════════════════════════════════════════

layers:

  # Base fill
  - id: bg-base
    type: rect
    z: 0
    x: 0
    y: 0
    width: 1587
    height: 1122
    fill:
      type: linear
      angle: 160
      stops:
        - { color: "#06080F", position: 0 }
        - { color: "#0A0F1C", position: 50 }
        - { color: "#060C18", position: 100 }

  # Noise grain overlay
  - id: bg-grain
    type: rect
    z: 1
    x: 0
    y: 0
    width: 1587
    height: 1122
    fill:
      type: noise
      opacity: 0.025
      frequency: 0.72
      octaves: 4

  # Top-left radial glow (primary)
  - id: glow-topleft
    type: rect
    z: 2
    x: -200
    y: -200
    width: 900
    height: 900
    fill:
      type: radial
      cx: 30
      cy: 30
      radius: 60
      stops:
        - { color: "#00D4FF", position: 0 }
        - { color: "transparent", position: 100 }
    opacity: 0.12

  # Bottom-right radial glow (secondary)
  - id: glow-bottomright
    type: rect
    z: 2
    x: 900
    y: 400
    width: 900
    height: 900
    fill:
      type: radial
      cx: 70
      cy: 70
      radius: 60
      stops:
        - { color: "#7B2FFF", position: 0 }
        - { color: "transparent", position: 100 }
    opacity: 0.14

  # Center accent glow (accent orange)
  - id: glow-center
    type: rect
    z: 2
    x: 600
    y: 300
    width: 600
    height: 600
    fill:
      type: radial
      cx: 50
      cy: 50
      radius: 50
      stops:
        - { color: "#FF6B35", position: 0 }
        - { color: "transparent", position: 100 }
    opacity: 0.06

  # Grid dot pattern overlay
  - id: bg-dots
    type: rect
    z: 3
    x: 0
    y: 0
    width: 1587
    height: 1122
    fill:
      type: noise
      opacity: 0.015
      frequency: 0.15
      octaves: 1

  # Diagonal rule line top
  - id: deco-diag-top
    type: line
    z: 4
    x1: 0
    y1: 80
    x2: 400
    y2: 0
    stroke: { color: "$primary", width: 0.5, opacity: 0.3 }

  # Diagonal rule line bottom
  - id: deco-diag-bottom
    type: line
    z: 4
    x1: 1187
    y1: 1122
    x2: 1587
    y2: 1042
    stroke: { color: "$secondary", width: 0.5, opacity: 0.3 }

# ═══════════════════════════════════════════════════════════════
#  STRUCTURAL CHROME  (z: 10–19)
# ═══════════════════════════════════════════════════════════════

  # Full-width top header bar
  - id: header-bg
    type: rect
    z: 10
    x: 0
    y: 0
    width: 1587
    height: 88
    fill:
      type: linear
      angle: 90
      stops:
        - { color: "#0E1421", position: 0 }
        - { color: "#06080F", position: 100 }
    stroke: { color: "$border", width: 1 }

  # Header top accent line
  - id: header-accent-line
    type: rect
    z: 11
    x: 0
    y: 0
    width: 1587
    height: 3
    fill:
      type: linear
      angle: 0
      stops:
        - { color: "$primary", position: 0 }
        - { color: "$secondary", position: 50 }
        - { color: "$accent", position: 100 }

  # Left column background
  - id: col-left-bg
    type: rect
    z: 10
    x: 0
    y: 88
    width: 380
    height: 1034
    fill:
      type: linear
      angle: 180
      stops:
        - { color: "#0E1421", position: 0 }
        - { color: "#0A1019", position: 100 }
    stroke: { color: "$border", width: 1 }

  # Main content area separator line
  - id: col-divider-1
    type: line
    z: 11
    x1: 380
    y1: 88
    x2: 380
    y2: 1034
    stroke: { color: "$border_accent", width: 1, opacity: 0.4 }

  # Right column separator
  - id: col-divider-2
    type: line
    z: 11
    x1: 1140
    y1: 88
    x2: 1140
    y2: 1034
    stroke: { color: "$border", width: 1, opacity: 0.3 }

  # Right side panel background
  - id: col-right-bg
    type: rect
    z: 10
    x: 1140
    y: 88
    width: 447
    height: 1034
    fill:
      type: linear
      angle: 180
      stops:
        - { color: "#0E1421", position: 0 }
        - { color: "#0A1019", position: 100 }

  # Footer bar
  - id: footer-bg
    type: rect
    z: 10
    x: 0
    y: 1034
    width: 1587
    height: 88
    fill:
      type: solid
      color: "#0A0F1C"
    stroke: { color: "$border", width: 1 }

  # Footer bottom accent line
  - id: footer-accent-line
    type: rect
    z: 11
    x: 0
    y: 1119
    width: 1587
    height: 3
    fill:
      type: linear
      angle: 0
      stops:
        - { color: "$accent", position: 0 }
        - { color: "$secondary", position: 50 }
        - { color: "$primary", position: 100 }

