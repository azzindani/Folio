      - id: section-narrative
        type: rich_text
        z: 40
        x: 60
        y: 880
        width: 1320
        height: 280
        format: markdown
        font_family: Inter
        font_size: 16
        line_height: 1.7
        color: '#CBD5E1'
        content: |
          ## Market Outlook

          The S&P 500 closed 2025 at **5,824.32**, up **21.7%** for the year — its strongest annual return since 2021. Gains were front-loaded in Q3 as the Fed pivoted to rate cuts and inflation moderated to **2.4%** by year-end.

          **Technology** (+38.4%) led the rally, driven by AI infrastructure spend and earnings beats from NVIDIA, AVGO, and AMD. **Communication Services** (+31.3%) and **Financials** (+22.7%) rounded out the top three. **Energy** was the lone declining sector (-4.2%) on lower oil prices and demand concerns.

          Volatility remained subdued — the **VIX** averaged 14.7 across the year and ended at a multi-year low of **12.48**, suggesting elevated complacency entering 2026.
