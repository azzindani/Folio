        content: |
          ## Sector Insights

          - **Technology** dominates with a **30.2%** index weight and **38.4%** YTD return — the AI infrastructure cycle continues to drive valuations to historically elevated P/E ratios near **32x**.
          - **Energy** lagged with a **-4.2%** return and trades at a discount **12.3x** P/E, reflecting concerns about supply-demand balance and the energy transition.
          - **Real Estate** has the highest P/E at **35.2x** despite modest **+5.3%** returns, indicating investor expectations of further rate cuts.
          - Defensive sectors (**Staples, Utilities**) underperformed as the risk-on rotation continued through Q4.
