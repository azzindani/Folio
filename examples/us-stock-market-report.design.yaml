          ## Income Strategy Notes

          The **Dividend Aristocrats** are S&P 500 constituents with at least **25 consecutive years** of dividend increases — a rare combination of cash-flow durability and capital-return discipline.

          - **Higher yields** often come paired with **higher payout ratios** (e.g. MMM at 89.3%) — sustainability requires careful monitoring of free cash flow.
          - **Lower-yield growers** like **LOW** (1.82%) and **TGT** (2.67%) have grown dividends fastest (DGR 17.4% / 12.3% over 5 years) — total-return potential rivals broad-market indexes.
          - The basket's average yield of **2.78%** clears the **3M Treasury** by a meaningful margin, and offers inflation protection via dividend growth.
