          ## Macro Backdrop

          The macroeconomic transition through 2025 was orderly:

          - **GDP** accelerated each quarter — from **2.4%** in Q1 to **3.1%** in Q4 — supported by resilient consumer spending and corporate capex on AI infrastructure.
          - **Inflation** continued to moderate, with CPI declining from **3.2%** to **2.4%** — within striking distance of the Fed's 2% target.
          - **The labor market** softened modestly to a **3.5%** unemployment rate, still tight by historical standards.
          - **The Fed** delivered three 25 bp cuts (March, July, October) — bringing the policy rate from **4.50% → 3.75%** while signalling further easing in 2026.
          - **The yield curve** remains slightly inverted at the front end (1M-2Y), but normalised at longer maturities — consistent with a soft-landing scenario.
